<style>
  /* GDS typography scale for Storybook docs pages */

  .sbdocs-wrapper,
  .sbdocs-content,
  .sbdocs {
    font-size: 19px !important;
    line-height: 1.5 !important;
  }

  .sbdocs h1,
  .sbdocs-h1 {
    font-size: 48px !important;
    line-height: 1.1 !important;
  }

  .sbdocs h2,
  .sbdocs-h2 {
    font-size: 36px !important;
    line-height: 1.2 !important;
  }

  .sbdocs h3,
  .sbdocs-h3 {
    font-size: 24px !important;
    line-height: 1.25 !important;
  }

  .sbdocs h4,
  .sbdocs-h4 {
    font-size: 19px !important;
    line-height: 1.5 !important;
    font-weight: 700 !important;
  }

  .sbdocs p,
  .sbdocs li,
  .sbdocs-p,
  .sbdocs-li {
    font-size: 19px !important;
    line-height: 1.5 !important;
  }

  /* Cap docs prose at two-thirds width (matching GOV.UK reading width) */
  .sbdocs-content h1,
  .sbdocs-content h2,
  .sbdocs-content h3,
  .sbdocs-content h4,
  .sbdocs-content p,
  .sbdocs-content ul,
  .sbdocs-content ol {
    max-width: 720px !important;
  }

  /* But let preview containers use full width */
  .sbdocs-preview,
  .sbdocs-preview * {
    max-width: none !important;
  }

  /* Fix checkbox/radio labels dropping below their input in docs previews.
     The wildcard max-width:none above breaks GOV.UK's flex-wrap layout for
     checkboxes and radios. Taking the invisible input out of the flex flow
     (the visual checkbox is already position:absolute via ::before) prevents
     the label from wrapping to a new line. */
  .sbdocs-preview .govuk-checkboxes__input,
  .sbdocs-preview .govuk-radios__input {
    position: absolute !important;
  }

  .sbdocs-preview .govuk-checkboxes__label,
  .sbdocs-preview .govuk-radios__label {
    padding-left: 59px !important; /* 44px (input touch target) + 15px (original padding) */
  }

  /* Story step headings — no border, no underline, badge aligned to top */
  .sbdocs-content h2 {
    border-bottom: none !important;
  }

  .sbdocs-content h2 a {
    text-decoration: none !important;
  }

  /* Force step heading flex container to align badge to top */
  .sbdocs-content div:has(> h2) {
    align-items: flex-start !important;
  }

  /* Size the circle badge to match heading first line */
  .sbdocs-content div:has(> h2) > div:first-child {
    width: 28px !important;
    height: 28px !important;
    min-width: 28px !important;
    font-size: 14px !important;
    margin-top: 5px !important;
  }

  /* GDS-style preview containers — simple border, no shadow */
  .sbdocs-preview {
    border: 1px solid #b1b4b6 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    padding: 30px !important;
  }
</style>
